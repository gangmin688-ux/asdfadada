async function sha256(str) {
const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function hashPw(pw) {
const salt = crypto.getRandomValues(new Uint8Array(16));
const saltHex = Array.from(salt).map(b=>b.toString(16).padStart(2,'0')).join('');
const keyMat = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveBits']);
const bits = await crypto.subtle.deriveBits(
{name:'PBKDF2', hash:'SHA-256', salt, iterations:100000}, keyMat, 256
);
const hashHex = Array.from(new Uint8Array(bits)).map(b=>b.toString(16).padStart(2,'0')).join('');
return `pbkdf2$${saltHex}$${hashHex}`;
}
async function pwMatch(input, stored) {
if(!stored) return false;
if(/^[0-9a-f]{64}$/.test(stored)) {
const h = await sha256(input);
return h === stored;
}
if(stored.startsWith('pbkdf2$')) {
const parts = stored.split('$');
if(parts.length !== 3) return false;
try {
const salt = new Uint8Array(parts[1].match(/.{2}/g).map(h=>parseInt(h,16)));
const keyMat = await crypto.subtle.importKey('raw', new TextEncoder().encode(input), 'PBKDF2', false, ['deriveBits']);
const bits = await crypto.subtle.deriveBits(
{name:'PBKDF2', hash:'SHA-256', salt, iterations:100000}, keyMat, 256
);
const hashHex = Array.from(new Uint8Array(bits)).map(b=>b.toString(16).padStart(2,'0')).join('');
return hashHex === parts[2];
} catch(e) { return false; }
}
return input === stored;
}

if(volType==='mid') return Math.random()<basePos?'pos':(Math.random()<0.5?'neu':'neg');
if(volType==='dip_rise'){
if(dayOffset>=4) return Math.random()<0.65?'neg':'neu';

}

}

function convertPortfolio(p){
const out={};
Object.entries(p).forEach(([code,v])=>{
if(typeof v==='number') out[code]={qty:v,avgCost:0};
else if(v&&typeof v==='object') out[code]=v;
});
return out;
}
function portVal(s){let v=0;Object.entries(s.portfolio).forEach(([c,e])=>{const q=typeof e==='object'?e.qty:(e||0);v+=(state.stocks[c]?.price||0)*q;});return v;}

function buildAssetHistory(s){
const dateMap={};
let running=0;
const txsSorted=[...s.transactions].sort((a,b)=>new Date(a.date)-new Date(b.date));
txsSorted.forEach(tx=>{
const d=tx.date;
if(!dateMap[d]) dateMap[d]={balance:0,total:0};
running+=tx.amount;
dateMap[d].balance=running;
});
const correction=s.balance-running;
const keys=Object.keys(dateMap).sort();
const result=[];
let last=s.balance-Object.values(dateMap).reduce((a,v,i,arr)=>0,0);
keys.forEach(d=>{
result.push({date:d, balance:dateMap[d].balance+correction});
});
const todayD=new Date().toLocaleDateString('ko-KR');
if(!result.length||result[result.length-1].date!==todayD){
result.push({date:todayD, balance:s.balance});
}
return result;
}

function teachGive(sign){
const id=parseInt(document.getElementById('tcSel').value);
const amt=parseInt(document.getElementById('tcAmt').value);
const reason=document.getElementById('tcReason').value||(sign>0?'교사 지급':'교사 차감');
if(!amt||amt<=0)return toast('금액 입력');
const s=state.students.find(x=>x.id===id);
if(sign<0&&s.balance<amt)return toast('잔액 부족');
s.balance+=sign*amt;
addTx(s,sign*amt,`교사: ${reason}`);
toast(`${s.name} ${Math.abs(sign*amt).toLocaleString()} ${C()} ${sign>0?'지급':'차감'}`);
}
function teachGiveAll(sign=1){
const amt=parseInt(document.getElementById('tcAllAmt').value);
const reason=document.getElementById('tcAllReason').value||(sign>0?'전체 보상':'전체 차감');
if(!amt||amt<=0)return toast('금액 입력');
state.students.forEach(s=>{
if(sign<0&&s.balance<amt){
const actual=s.balance;
s.balance=0;
if(actual>0)addTx(s,-actual,`교사(전체): ${reason}`);
} else {
s.balance+=sign*amt;
addTx(s,sign*amt,`교사(전체): ${reason}`);
}
});
toast(`전체 ${state.students.length}명 ${amt.toLocaleString()} ${C()} ${sign>0?'지급':'차감'} 완료`);
}
function paySalaries(){
let count=0;
state.students.forEach(s=>{
const job=jobOf(s);
if(job){
s.balance+=job.salary;
addTx(s,job.salary,`월급: ${job.emoji}${job.name} (${job.salary}${C()})`);
count++;
}
});
toast(`💰 ${count}명에게 월급 지급 완료!`);
}

async function bulkResetPw(){
const pw=document.getElementById('bulkPwInput')?.value?.trim();
if(!pw){toast('비밀번호를 입력하세요');return;}
if(pw.length<4){toast('비밀번호는 최소 4자리 이상이어야 합니다');return;}
if(!confirm(`전체 ${state.students.length}명의 비밀번호를 "${pw}"로 초기화하시겠습니까?\n각 학생마다 다른 Salt로 암호화됩니다.`))return;
const statusEl=document.getElementById('bulkPwStatus');
if(statusEl)statusEl.textContent='⏳ 암호화 중...';
let done=0;
for(const s of state.students){
s.pw=await hashPw(pw);
if(isDbReady()) await dbSaveStudent(s);
done++;
if(statusEl)statusEl.textContent=`⏳ 암호화 중... (${done}/${state.students.length})`;
}
if(statusEl)statusEl.textContent=`✅ ${state.students.length}명 비밀번호 초기화 완료! (PBKDF2 암호화)`;
toast(`✅ 전체 비밀번호 초기화 완료`);
}

function sdUpdateStock(code){
const s=state.students.find(x=>x.id===_sdStudentId);
if(!s) return;
const qty=parseInt(document.getElementById('sdStockQty_'+code)?.value)||0;
if(qty<=0){ sdRemoveStock(code); return; }
const prev=s.portfolio[code]||{qty:0,avgCost:state.stocks[code]?.price||0};
const avgCost=typeof prev==='object'?prev.avgCost:0;
s.portfolio[code]={qty,avgCost:avgCost||state.stocks[code]?.price||0};
dbSaveStudent(s);
toast(`${COMPANIES.find(c=>c.code===code)?.name||code} 수량 → ${qty}주`);
renderStudentDetail();
}
function sdRemoveStock(code){
const s=state.students.find(x=>x.id===_sdStudentId);
if(!s) return;
delete s.portfolio[code];
dbSaveStudent(s);
toast(`${COMPANIES.find(c=>c.code===code)?.name||code} 주식 삭제`);
renderStudentDetail();
}
function sdAddStock(){
const s=state.students.find(x=>x.id===_sdStudentId);
if(!s) return;
const code=document.getElementById('sdAddStockCode')?.value;
const qty=parseInt(document.getElementById('sdAddStockQty')?.value)||1;
const avg=parseInt(document.getElementById('sdAddStockAvg')?.value)||state.stocks[code]?.price||0;
if(!code||qty<=0) return toast('종목과 수량을 입력하세요');
const prev=s.portfolio[code]||{qty:0,avgCost:avg};
const prevQty=typeof prev==='object'?prev.qty:0;
const prevAvg=typeof prev==='object'?prev.avgCost:avg;
const newQty=prevQty+qty;
const newAvg=newQty>0?Math.round((prevAvg*prevQty+avg*qty)/newQty):avg;
s.portfolio[code]={qty:newQty,avgCost:newAvg};
dbSaveStudent(s);
toast(`${COMPANIES.find(c=>c.code===code)?.name||code} ${qty}주 추가`);
renderStudentDetail();
}
function sdAddItem(itemId){
const s=state.students.find(x=>x.id===_sdStudentId);
const item=state.storeItems.find(x=>x.id===itemId);
if(!s||!item) return;
s.items.push({...item});
dbSaveStudent(s);
toast(`${item.emoji} ${item.name} +1`);
renderStudentDetail();
}
function sdRemoveItem(itemId){
const s=state.students.find(x=>x.id===_sdStudentId);
if(!s) return;
const idx=s.items.findLastIndex?s.items.findLastIndex(x=>x.id===itemId):([...s.items].map((x,i)=>x.id===itemId?i:-1).filter(i=>i>=0).pop()??-1);
if(idx<0) return toast('아이템 없음');
const item=s.items[idx];
s.items.splice(idx,1);
dbSaveStudent(s);
toast(`${item.emoji} ${item.name} -1`);
renderStudentDetail();
}
function sdAddItemBulk(){
const s=state.students.find(x=>x.id===_sdStudentId);
if(!s) return;
const itemId=parseInt(document.getElementById('sdAddItemId')?.value);
const qty=parseInt(document.getElementById('sdAddItemQty')?.value)||1;
const item=state.storeItems.find(x=>x.id===itemId);
if(!item) return toast('아이템을 선택하세요');
for(let i=0;i<qty;i++) s.items.push({...item});
dbSaveStudent(s);
toast(`${item.emoji} ${item.name} ${qty}개 추가`);
renderStudentDetail();
}

function toggleAssign(studentId,jobId){
const s=state.students.find(x=>x.id===studentId);

if(!s||!job) return;
if(s.jobId===jobId){
s.jobId=null;
} else {
const alreadyAssigned=state.students.filter(x=>x.id!==studentId&&x.jobId===jobId);

}
s.jobId=jobId;
}

renderAssignJobModal();
}

function giveRoiPrizes(){
const p1=parseInt(document.getElementById('roiPrize1')?.value)||cfg.roiPrize1||500;
const p2=parseInt(document.getElementById('roiPrize2')?.value)||cfg.roiPrize2||300;

cfg.roiPrize1=p1; cfg.roiPrize2=p2; cfg.roiPrize3=p3;
dbSaveConfig();
const ranked=state.students.map(st=>{
const totalBuy=Object.entries(st.portfolio).reduce((a,[code,e])=>{
const qty=typeof e==='object'?e.qty:(e||0);
const avgCost=typeof e==='object'?e.avgCost:0;
return a+avgCost*qty;
},0);
if(totalBuy<300) return null;
const pv=portVal(st);
const roi=totalBuy>0?((pv-totalBuy)/totalBuy*100):0;
return {s:st, roi};
}).filter(Boolean).sort((a,b)=>b.roi-a.roi);
if(!ranked.length){ toast('300코인 이상 투자자가 없습니다'); return; }
const prizes=[p1,p2,p3];
const medals=['🥇','🥈','🥉'];
let msg='';
ranked.slice(0,3).forEach((r,i)=>{
r.s.balance+=prizes[i];
addTx(r.s, prizes[i], `${medals[i]} 이달 수익률 ${i+1}위 상금 +${prizes[i]}코인 (${r.roi.toFixed(1)}%)`);
if(isDbReady()) dbSaveStudent(r.s);
msg+=`${medals[i]} ${r.s.name} +${prizes[i]}코인
`;
});
state.roiSnapshot={};
if(isDbReady()) fbSet('config','1',{roi_snapshot:{},roi_snapshot_month:new Date().toLocaleDateString('ko-KR')});
toast('🏆 상금 지급 완료! '+msg+'수익률 기록 초기화됨');
updateNavBal();
renderTeachSettings();
}

d.setDate(d.getDate()+1);

function setMonthCleanAll(mk,turnOn){
if(!cfg.cleaningDays||typeof cfg.cleaningDays[0]==='number') cfg.cleaningDays=[];
const [cy,cm]=mk.split('.').map(Number);
const tmp=new Date(cy,cm-1,1);
while(tmp.getMonth()===cm-1){
if(tmp.getDay()!==0&&tmp.getDay()!==6){
const d=tmp.toLocaleDateString('ko-KR');
const idx=cfg.cleaningDays.indexOf(d);
if(turnOn&&idx<0) cfg.cleaningDays.push(d);
else if(!turnOn&&idx>=0) cfg.cleaningDays.splice(idx,1);
}
tmp.setDate(tmp.getDate()+1);
}
dbSaveConfig();
renderTeachClean();
}

function mulberry32(seed){
let t=seed+0x6D2B79F5;
t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);
return((t^t>>>14)>>>0)/4294967296;
}
function seededRnd(seed){ return (mulberry32(seed)-.5)*2; }
function getStockTimeSeed(){
if(!isMarketOpen()) return 0;
return Math.floor(Date.now()/3600000);
}
function getHighTick(){
const now=new Date();
const dayStart=new Date(now.getFullYear(),now.getMonth(),now.getDate(),9,0,0);
return Math.floor((now-dayStart)/3600000);
}
setInterval(()=>{
if(!isMarketOpen()){
return;
}
const timeSeed=getStockTimeSeed();
const highTick=getHighTick();
COMPANIES.forEach((co,ci)=>{
const stk=state.stocks[co.code];
let dVol, dTrend;
if(co.volType==='high'){
dVol=0.15;
if(highTick<=15)      dTrend=+0.020;
else if(highTick<=20) dTrend=+0.002;
else if(highTick<=50) dTrend=-0.018;
else                  dTrend=-0.025;
} else {
const phase=getMarketPhase();
const mBias = phase==='bull' ? +0.002 : -0.002;
const vp={
blue:     [0.015, mBias*0.5],
volatile: [0.07,  mBias*1.5],
mid:      [0.035, mBias*1.0],
steady:   [0.001, +0.002],
giant:    [0.01,  +0.0003],
}[co.volType]||[0.025, mBias];
[dVol,dTrend]=vp;
}
const prevRnd=seededRnd((timeSeed-1)*37+ci*1000003);
const shortTermPenalty=(co.volType==='volatile'||co.volType==='mid')&&prevRnd>0.3?-0.15:0;
const baseRnd=seededRnd(timeSeed*37+ci*1000003)+shortTermPenalty;
const sentiment=getTodayNewsSentiment(co.code);
let rnd;
if(sentiment==='pos'){
rnd=baseRnd>0 ? baseRnd : (Math.abs(baseRnd)*0.3*Math.sign(baseRnd));
} else if(sentiment==='neg'){
rnd=baseRnd<0 ? baseRnd : (Math.abs(baseRnd)*0.3*Math.sign(baseRnd));
} else {
rnd=baseRnd;
}
const dailyStart = stk.daily.length>=2 ? stk.daily[stk.daily.length-2] : stk.price;
const rawNp = Math.round(stk.price*(1+rnd*dVol+dTrend));
let np = rawNp;
if(co.volType==='volatile'){
const maxUp = Math.round(dailyStart*1.15);
const maxDn = Math.max(5, Math.round(dailyStart*0.85));
np = Math.min(maxUp, Math.max(maxDn, rawNp));
const initPrice = stk.daily[0]||100;
const maxAbs = Math.min(initPrice*5, 99999);
np = Math.min(np, maxAbs);
if(!isFinite(np)||isNaN(np)) np=dailyStart||100;
}
np = Math.max(5, np);
stk.prevClose=stk.price;
stk.daily.push(np);
if(stk.daily.length>31)stk.daily.shift();
stk.price=np;
stk.daily[stk.daily.length-1]=np;
});
if(isDbReady()) COMPANIES.forEach(co=>dbSaveStock(co.code));
if(document.getElementById('page-stock')?.classList.contains('active')){renderStockList();if(state.selectedStock)selectStock(state.selectedStock);}
updateNavBal();
},3600000);

function monthlyIncome(s){
const now=new Date();
const yy=now.getFullYear();
const mm=now.getMonth()+1;
return s.transactions
.filter(t=>{
if(t.amount<=0)return false;
const parts=(t.date||'').replace(/\s/g,'').split('.');
return parseInt(parts[0])===yy && parseInt(parts[1])===mm;
})
.reduce((sum,t)=>sum+t.amount,0);
}
function calcTax(s){
if(!cfg.tax||!cfg.tax.enabled)return 0;
const rate=jobOf(s)?cfg.tax.withJobRate:cfg.tax.noJobRate;
const income=monthlyIncome(s);
const raw=Math.floor(income*rate/100);
return Math.max(cfg.tax.minAmount||0,raw);
}
function autoCollectTax(){
if(!cfg.tax||!cfg.tax.enabled)return;
const now=new Date();
const monthKey=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
if(cfg.tax.lastPaidMonth===monthKey){toast('이미 이번 달 세금이 납부되었습니다');return;}
let count=0; let totalCollected=0;
state.students.forEach(s=>{
const amt=calcTax(s);
if(amt>0&&s.balance>0){
const actual=Math.min(amt,s.balance);
s.balance-=actual;
totalCollected+=actual;
addTx(s,-actual,'💸 세금 납부 ('+monthKey+') -'+actual+'코인');
count++;
}
});
cfg.tax.lastPaidMonth=monthKey;
cfg.classFund=(cfg.classFund||0)+totalCollected;
if(!cfg.tax.taxHistory) cfg.tax.taxHistory=[];
cfg.tax.taxHistory.unshift({
date:new Date().toLocaleDateString('ko-KR'),
type:'collect',
amount:totalCollected,
desc:'세금 징수 ('+monthKey+') '+count+'명',
});
if(cfg.tax.taxHistory.length>50) cfg.tax.taxHistory=cfg.tax.taxHistory.slice(0,50);
dbSaveConfig();
toast('💸 세금 징수 완료 — '+count+'명 / 반 기금 +'+totalCollected+'코인 (누계: '+cfg.classFund+'코인)');
refreshCurrentPage();
}

async function dbLoadTasks(){
if(!isDbReady())return;
try{
const today=new Date().toLocaleDateString('ko-KR');
const tasksSnap=await db.collection('tasks').where('date','==',today).get();
const allTasksSnap=await db.collection('tasks').get();
const allData=allTasksSnap.docs.map(d=>d.data());
const todayDate=new Date(); todayDate.setHours(0,0,0,0);
const filtered=allData.filter(r=>{
if(r.date===today) return true;
if(r.deadline){ const dl=new Date(r.deadline); dl.setHours(23,59,59,999); return dl>=todayDate; }
return false;
});
const fiveDaysAgo=new Date(); fiveDaysAgo.setDate(fiveDaysAgo.getDate()-5);
if(filtered) state.tasks=filtered.map(r=>({
id:r.id,category:r.category,title:r.title,date:r.date,
isRequired:r.is_required||false,deadline:r.deadline||'',
deletedAt:r.deleted_at||''
})).filter(r=>{
if(!r.deletedAt) return true;
const da=new Date(r.deletedAt);
if(da<fiveDaysAgo){
if(isDbReady()) fbDel('tasks',r.id);
return false;
}
return true;
});
const doneSnap=await db.collection('task_done').get(); const doneData=doneSnap.docs.map(d=>({task_student_id:d.id,...d.data()}));
if(doneData) doneData.forEach(r=>{state.taskDoneStatus[r.task_student_id]=r.done;});
}catch(e){console.warn('tasks 로드 실패(테이블 없으면 무시):',e);}
}
function autoDeductMissingTasks(){
const today=new Date().toLocaleDateString('ko-KR');
const requiredTasks=state.tasks.filter(t=>t.isRequired&&t.date===today);
if(!requiredTasks.length)return;
let deductCount=0;
const now=new Date();
state.students.forEach(s=>{
requiredTasks.forEach(task=>{
const key=task.id+'_'+s.id;
const isDone=!!state.taskDoneStatus[key];
if(task.deadline){
const dl=new Date(task.deadline);
dl.setHours(10,40,0,0);
if(now<=dl)return;
}
if(!isDone){
const amt=cfg.taskPenalty||10;
s.balance=Math.max(0,s.balance-amt);
addTx(s,-amt,`⏰ 의무과제 미수행: "${task.title}" -${amt}코인`);
deductCount++;
}
});
});
if(deductCount>0){
toast(`⏰ 의무과제 미수행 자동 차감 완료 (${deductCount}건)`);
refreshCurrentPage();
}
}

function applyCleanStatusRow(r){

state.recycleStatus[id]=r.status;
} else if(typeof sid==='string'&&sid.endsWith('_t')){
const id=parseInt(sid);
state.tabletStatus[id]=r.status;
} else {
const updKST=new Date(r.updated_at).toLocaleDateString('ko-KR');
const todayKST=new Date().toLocaleDateString('ko-KR');
if(updKST===todayKST){
state.cleanStatus[sid]=r.status;
if(r.status==='done') state.cleanNotify[sid]='pending_verify';
else if(r.status==='checked'||r.status==='absent') state.cleanNotify[sid]=null;
}
}
}

async function resetAndSeedStudents(){
if(!isDbReady()){alert('DB가 연결되지 않았습니다.');return;}
let _confirmed=false;
await new Promise(resolve=>{
showConfirm('학생 전체 초기화',
'⚠️ 기존 DB의 학생 데이터를 전부 삭제하고 22명을 새로 등록합니다.<br><span style="color:var(--danger)">잔액·거래내역·포트폴리오가 모두 초기화됩니다.</span>',
()=>{_confirmed=true;resolve();},
()=>{resolve();}
);
});
if(!_confirmed)return;
const btn=document.getElementById('btnResetStudents');
if(btn){btn.disabled=true;btn.textContent='⏳ 처리 중...';}
try{
const snap=await db.collection('students').get();
await Promise.all(snap.docs.map(d=>d.ref.delete()));
state.students=genStudents();
assignDefaultJobs();
for(const s of state.students){
const pw=await hashPw('1234');
await fbSet('students',s.id,{
id:s.id,name:s.name,pw,
balance:s.balance,transactions:[],portfolio:{},
items:[],earned:s.balance,spent:0,job_id:null,
});
}
await loadStateFromDb();
toast('✅ 22명 학생 등록 완료! (초기 비밀번호: 1234)');
}catch(e){
alert('오류 발생: '+e.message);

}finally{
if(btn){btn.disabled=false;btn.textContent='🔄 DB 학생 전체 초기화 후 22명 재등록';}
}
}

const defaultTeacherPw='03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4';
await fbSet('config','1',{grade:cfg.grade,class_num:cfg.classNum,bank_name:cfg.bankName,
coin_name:cfg.coinName,coin_symbol:cfg.coinSymbol,
teacher_pw: defaultTeacherPw,
allow_transfer:true,allow_stock:true,allow_store:true,show_balance:true,force_market:false,
cleaning_days:[1,2,3,4,5],
coin_amounts:{cleanApprove:10,cleanBad:-10,cleanRecheck:10,cleanMissed:-10,
recycleApprove:5,tabletApprove:5,seatApprove:5,seatBad:-5,
seatMgrLow:-10,seatMgrHigh:10,seatMgrPenalty:-10,cleanMgrMissed:-10,tabletMissed:-5},
});
cfg.teacherPw = defaultTeacherPw;
} else {
}
const stuRows_snap=await db.collection('students').limit(1).get(); const stuRows=stuRows_snap.empty?null:[1];
if(!stuRows||stuRows.length===0){
const defaultPw = await hashPw('1234');
for(const s of state.students){
const pw = await hashPw('1234');
await fbSet('students',s.id,{
id:s.id, name:s.name, pw,
balance:s.balance, transactions:[], portfolio:{},
items:[], earned:s.balance, spent:0, job_id:null,
});
}
}
const rows=state.jobs.map(j=>({id:j.id,name:j.name,emoji:j.emoji,max_count:j.maxCount,salary:j.salary,description:j.desc,page_content:j.page||''}));

const rows=state.storeItems.map(i=>({id:i.id,name:i.name,emoji:i.emoji,price:i.price,stock:i.stock,description:i.desc}));
for(const r of rows) await fbSet('store_items',r.id,r);

await dbInitStocks();

const _orig = {
markCleanDone: markCleanDone,
verifyClean: verifyClean,
markAbsentClean: markAbsentClean,
paySalaries: paySalaries,
teachGive: teachGive,
teachGiveAll: teachGiveAll,
addStudent: addStudent,
removeStudent: removeStudent,
saveJob: saveJob,
deleteJob: deleteJob,
addStoreItem: addStoreItem,
removeItem: removeItem,
restockItem: restockItem,
buyItem: buyItem,
saveCfg: saveCfg,
saveCfgToggles: saveCfgToggles,
doStockBuy: doStockBuy,
doStockSell: doStockSell,
doTransfer: doTransfer,
changePw: changePw,
editStudentPw: editStudentPw,
updateNavBal: updateNavBal,
};
markCleanDone = (studentId) => {
_orig.markCleanDone(studentId);
dbSaveCleanStatus(studentId, 'done');
};
verifyClean = (studentId) => {
_orig.verifyClean(studentId);
dbSaveCleanStatus(studentId, 'checked');
const s = state.students.find(x => x.id === studentId);
if(s) dbSaveStudent(s);
};
markAbsentClean = (studentId) => {
_orig.markAbsentClean(studentId);
dbSaveCleanStatus(studentId, 'absent');
const s = state.students.find(x => x.id === studentId);
if(s) dbSaveStudent(s);
};
teachMarkActivity = (studentId, status) => {
_orig.teachMarkActivity(studentId, status);
const s = state.students.find(x => x.id === studentId);
if(s) dbSaveStudent(s);
};
paySalaries = async () => {
_orig.paySalaries();
for(const s of state.students){ if(s.jobId) await dbSaveStudent(s); }
};
teachGive = (sign) => {
_orig.teachGive(sign);

teachGiveAll = async (sign=1) => {

for(const s of state.students) await dbSaveStudent(s);
};
addStudent = async () => {
_orig.addStudent();
const s = state.students[state.students.length - 1];
if(s && isDbReady()){
await fbSet('students',s.id,{id:s.id,name:s.name,pw:s.pw,balance:s.balance,transactions:[],portfolio:{},items:[],earned:s.balance,spent:0,job_id:null});
}
};
removeStudent = async (id) => {
_orig.removeStudent(id);
if(isDbReady()) await fbDel('students',id);
};
saveJob = () => {
_orig.saveJob();
const id = document.getElementById('ajId').value;
if(id){ const j=state.jobs.find(x=>x.id===parseInt(id)); if(j) dbSaveJob(j); }
else { const j=state.jobs[state.jobs.length-1]; if(j) dbSaveJob(j); }
};
deleteJob = (id) => { _orig.deleteJob(id); dbDeleteJob(id); };
addStoreItem = () => { _orig.addStoreItem(); const i=state.storeItems[state.storeItems.length-1]; if(i) dbSaveStoreItem(i); };
removeItem = (id) => { _orig.removeItem(id); dbDeleteStoreItem(id); };
restockItem = (id) => { _orig.restockItem(id); const i=state.storeItems.find(x=>x.id===id); if(i) dbSaveStoreItem(i); };
buyItem = async (id) => {
_orig.buyItem(id);
const s = cur(); if(s) await dbSaveStudent(s);
const item = state.storeItems.find(x => x.id === id); if(item) dbSaveStoreItem(item);
};
saveCfg = async () => { await _orig.saveCfg(); await dbSaveConfig(); };
saveCfgToggles = async () => { _orig.saveCfgToggles(); await dbSaveConfig(); };
doStockBuy = () => { _orig.doStockBuy(); const s=cur(); if(s) dbSaveStudent(s); };
doStockSell = () => { _orig.doStockSell(); const s=cur(); if(s) dbSaveStudent(s); };
doTransfer = async () => { _orig.doTransfer(); for(const s of state.students) await dbSaveStudent(s); };
changePw = async () => { _orig.changePw(); const s=cur(); if(s) await dbSaveStudent(s); };
editStudentPw = async (id) => { _orig.editStudentPw(id); const s=state.students.find(x=>x.id===id); if(s) await dbSaveStudent(s); };
updateNavBal = () => {
_orig.updateNavBal();
};
async function bootApp(){
initSupabase();
if(isDbReady()){
setDbStatus('connecting');
await dbSeedIfEmpty();
await loadStateFromDb();
subscribeRealtime();
} else {
setDbStatus('offline');
console.warn('SUPABASE_URL / SUPABASE_ANON_KEY가 설정되지 않았습니다. 오프라인 모드로 실행됩니다.');
}
await tryAutoLogin();
}
async function tryAutoLogin(){
try{
const raw=localStorage.getItem('cb_session');
if(!raw)return;
const saved=JSON.parse(raw);
if(Date.now()-saved.savedAt>7*24*60*60*1000){
localStorage.removeItem('cb_session');return;
}
if(saved.isTeacher){
if(isDbReady() && saved.sessionToken){
const cfgRow=await fbGet('config','1');
if(!cfgRow || cfgRow.session_token !== saved.sessionToken){
localStorage.removeItem('cb_session');
console.warn('[보안] 교사 세션 토큰 불일치 — 자동 로그인 거부');
return;
}
} else if(isDbReady() && !saved.sessionToken){
localStorage.removeItem('cb_session');
console.warn('[보안] 구버전 교사 세션 — 재로그인 필요');
return;
}
session={loggedIn:true,isTeacher:true,studentId:null};
startApp();
} else {
const s=state.students.find(x=>x.id===saved.studentId);
if(!s){localStorage.removeItem('cb_session');return;}
if(isDbReady() && !s.pw){
localStorage.removeItem('cb_session');return;
}
session={loggedIn:true,isTeacher:false,studentId:s.id};
startApp();
}
}catch(e){
try{localStorage.removeItem('cb_session');}catch(e2){}
}
}
async function bootApp(){
await new Promise((resolve,reject)=>{
if(typeof firebase!=='undefined'){resolve();return;}
const s1=document.createElement('script');
s1.src='https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js';
s1.onload=()=>{
const s2=document.createElement('script');
s2.src='https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js';
s2.onload=resolve;s2.onerror=reject;
document.head.appendChild(s2);
};
s1.onerror=reject;
document.head.appendChild(s1);
});
initSupabase();
if(!isDbReady()){setDbStatus('offline');return;}
await new Promise(r=>setTimeout(r,Math.floor(Math.random()*1000)));
async function loadWithRetry(retries=5){
try{
setDbStatus('connecting');
await dbSeedIfEmpty();
await loadStateFromDb();
subscribeRealtime();
await tryAutoLogin();
}catch(e){
if(retries>0){
console.warn('DB 로드 실패, 재시도...',e);
setDbStatus('error');
await new Promise(r=>setTimeout(r,2000));
await loadWithRetry(retries-1);
}else{
setDbStatus('error');
console.error('DB 연결 최종 실패',e);
}
}
}
loadWithRetry();
}
bootApp();
if ('serviceWorker' in navigator) {
navigator.serviceWorker.getRegistrations().then(regs => {
regs.forEach(reg => reg.unregister());
});
}
if ('caches' in window) {
caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
}
